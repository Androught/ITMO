version: "3.8"
services:
  web:
    image: httpd:2.4
    container_name: apache
    depends_on:
      - fastcgi
    volumes:
      - ./Apache/httpd.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ./web:/usr/local/apache2/htdocs:ro
    ports:
      - "8080:80"

  fastcgi:
    build: ./fastcgi
    container_name: fastcgi
    expose:
      - "9000"
